name: CI - user-service

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run tests (placeholder)
        run: echo "No tests yet - add npm test later"

      - name: SAST - Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/javascript

      - name: Build Docker image
        run: docker build -t itsmeynr/user-service:${{ github.sha }} .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: itsmeynr/user-service:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          docker tag itsmeynr/user-service:${{ github.sha }} itsmeynr/user-service:latest
          docker push itsmeynr/user-service:${{ github.sha }}
          docker push itsmeynr/user-service:latest

      - name: Update GitOps repo with new image tag
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_PAT }}@github.com/ynraws/gitops.git gitops-repo
          cd gitops-repo
          sed -i "s|image: itsmeynr/user-service:.*|image: itsmeynr/user-service:${{ github.sha }}|" user-service/deployment.yaml
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add user-service/deployment.yaml
          git commit -m "Update user-service image to ${{ github.sha }}" || echo "No changes to commit"
          git push
